<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>连点成线</title>
  <style>
    :root {
      --paper: #f4efe4;
      --panel: #fffaf0;
      --ink: #1f2421;
      --muted: #6f675b;
      --line: #d9cdb9;
      --red: #a43f35;
      --teal: #2f7774;
      --gold: #b28538;
      --blue: #526b94;
      --green: #687f48;
      --shadow: 0 14px 36px rgba(42, 35, 26, .08);
      --serif: "Fraunces", "Noto Serif SC", "Songti SC", "STSong", Georgia, serif;
      --sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      --num: "Fraunces", "Noto Serif SC", Georgia, serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background:
        radial-gradient(circle at 18% 12%, rgba(178, 133, 56, .09), transparent 28%),
        radial-gradient(circle at 88% 8%, rgba(82, 107, 148, .07), transparent 30%),
        #e9dec9;
      color: var(--ink);
      font-family: var(--sans);
      letter-spacing: 0;
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
    }

    button, input { font: inherit; }

    button:focus-visible,
    input:focus-visible {
      outline: 2px solid rgba(47, 119, 116, .5);
      outline-offset: 3px;
    }

    .app {
      min-height: 100vh;
      background:
        radial-gradient(circle at 50% -8%, rgba(255, 250, 240, .72), transparent 33%),
        linear-gradient(90deg, rgba(31, 36, 33, .018) 1px, transparent 1px),
        linear-gradient(rgba(31, 36, 33, .014) 1px, transparent 1px),
        radial-gradient(circle at 20% 30%, rgba(31, 36, 33, .025) .7px, transparent .9px),
        radial-gradient(circle at 72% 64%, rgba(164, 63, 53, .018) .6px, transparent .9px),
        var(--paper);
      background-size: auto, 34px 34px, 37px 37px, 5px 5px, 7px 7px, auto;
    }

    .topbar {
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 42px;
      border-bottom: 1px solid rgba(88, 70, 46, .13);
      background:
        linear-gradient(rgba(255, 250, 240, .9), rgba(255, 250, 240, .84)),
        radial-gradient(circle at 20% 30%, rgba(31, 36, 33, .025) .7px, transparent .9px);
      background-size: auto, 6px 6px;
      position: sticky;
      top: 0;
      z-index: 20;
      backdrop-filter: blur(10px);
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 22px;
      font-weight: 800;
      font-family: var(--serif);
      letter-spacing: .01em;
    }

    .brand-home {
      border: 0;
      background: transparent;
      color: var(--ink);
      padding: 0;
      cursor: pointer;
    }

    .mark {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: url("logo-a.png") center / cover no-repeat;
      box-shadow: 0 2px 8px rgba(31, 36, 33, .08);
      flex: 0 0 auto;
    }

    .nav {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .nav button {
      border: 0;
      background: transparent;
      color: var(--muted);
      padding: 10px 14px;
      border-radius: 999px;
      cursor: pointer;
      transition: background .16s ease, color .16s ease, transform .16s ease;
      font-weight: 650;
    }

    .nav button.active {
      color: var(--teal);
      font-weight: 750;
      background: rgba(47, 119, 116, .12);
      box-shadow: inset 0 0 0 1px rgba(47, 119, 116, .18);
    }

    .nav button:hover {
      transform: translateY(-1px);
      color: var(--ink);
      background: rgba(31, 36, 33, .06);
    }

    .nav button.active:hover {
      color: var(--teal);
      background: rgba(47, 119, 116, .16);
    }

    .search-box {
      position: relative;
      width: min(30vw, 340px);
    }

    .search-box input {
      width: 100%;
      height: 38px;
      border: 1px solid rgba(78, 60, 38, .18);
      border-radius: 999px;
      background: rgba(255, 250, 240, .86);
      color: var(--ink);
      padding: 0 76px 0 16px;
      outline: none;
      box-shadow: inset 0 1px 0 rgba(255, 250, 240, .72);
    }

    .search-box input:focus {
      border-color: rgba(47, 119, 116, .52);
      box-shadow: 0 0 0 3px rgba(47, 119, 116, .12);
    }

    .search-box button {
      position: absolute;
      right: 5px;
      top: 4px;
      width: 30px;
      height: 30px;
      border: 0;
      border-radius: 50%;
      background: var(--teal);
      color: #fffaf2;
      cursor: pointer;
      font-weight: 800;
      box-shadow: 0 2px 8px rgba(47, 119, 116, .16);
    }

    .search-clear {
      display: none;
      position: absolute;
      right: 41px;
      top: 4px;
      width: 30px;
      height: 30px;
      border: 0;
      border-radius: 50%;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-size: 20px;
      line-height: 1;
    }

    .search-box.has-value .search-clear {
      display: block;
    }

    .view { display: none; }
    .view.active { display: block; }

    .home {
      max-width: 1180px;
      margin: 0 auto;
      padding: 74px 28px 90px;
      display: grid;
      grid-template-columns: 1.02fr .98fr;
      gap: 72px;
      align-items: start;
    }

    .home-left > section:first-child {
      position: relative;
      padding-top: 6px;
    }

    .home-left > section:first-child::before {
      content: "";
      position: absolute;
      left: -22px;
      top: 8px;
      width: 3px;
      height: 78px;
      background: linear-gradient(var(--red), rgba(164, 63, 53, .18));
      border-radius: 999px;
    }

    .home-left {
      display: grid;
      gap: 46px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      height: 28px;
      padding: 0 11px;
      border-radius: 999px;
      color: var(--red);
      background: rgba(164, 63, 53, .08);
      border: 1px solid rgba(164, 63, 53, .16);
      font-size: 14px;
      font-weight: 650;
      font-family: var(--serif);
    }

    h1, h2, h3, p { margin-top: 0; }

    h1, h2, h3 {
      font-family: var(--serif);
      letter-spacing: 0;
    }

    .home h1 {
      margin: 0 0 26px;
      font-size: clamp(44px, 5.4vw, 68px);
      line-height: 1.12;
      font-weight: 760;
      color: #202a27;
    }

    .lead {
      color: rgba(79, 71, 61, .88);
      font-size: 18px;
      line-height: 1.92;
      max-width: 600px;
      font-family: var(--serif);
      font-weight: 420;
    }

    .home-cta {
      margin-top: 34px;
      height: 50px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(31, 36, 33, .2);
      border-radius: 999px;
      background: rgba(31, 36, 33, .08);
      color: var(--ink);
      padding: 0 24px;
      font-weight: 750;
      font-family: var(--sans);
      cursor: pointer;
      box-shadow: 0 10px 22px rgba(31, 36, 33, .08);
      transition: transform .16s ease, background .16s ease, box-shadow .16s ease, color .16s ease, border-color .16s ease;
    }

    .home-cta:hover {
      background: var(--red);
      border-color: var(--red);
      color: #fffaf2;
      transform: translateY(-2px);
      box-shadow: 0 12px 26px rgba(164, 63, 53, .18);
    }

    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }

    .section-title h2 {
      font-size: 30px;
      margin: 0;
      position: relative;
      color: #202a27;
    }

    .section-title h2::after,
    .relations h2::after,
    .result-section h2::after {
      content: "";
      display: block;
      width: 44px;
      height: 2px;
      margin-top: 10px;
      background: var(--red);
    }

    .cards {
      display: grid;
      gap: 16px;
    }

    .home-recommendations {
      display: grid;
      gap: 34px;
    }

    .today-slot:empty {
      display: none;
    }

    .card {
      border: 1px solid rgba(78, 60, 38, .14);
      border-radius: 10px;
      background:
        linear-gradient(rgba(255, 250, 240, .9), rgba(255, 250, 240, .86)),
        radial-gradient(circle at 18% 26%, rgba(31, 36, 33, .025) .7px, transparent .95px);
      background-size: auto, 6px 6px;
      box-shadow: var(--shadow);
      padding: 22px;
    }

    .rec-card {
      cursor: pointer;
      transition: transform .16s ease, border-color .16s ease;
    }

    .rec-card:hover {
      transform: translateY(-3px);
      border-color: rgba(164, 63, 53, .3);
      box-shadow: 0 18px 42px rgba(42, 35, 26, .11);
    }

    .rec-card h3 {
      margin-bottom: 10px;
      font-size: 23px;
    }

    .rec-card p {
      color: #5d554b;
      line-height: 1.58;
      margin-bottom: 14px;
    }

    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 27px;
      padding: 5px 10px;
      border-radius: 999px;
      color: #4b453d;
      background: rgba(255, 250, 240, .55);
      border: 1px solid rgba(78, 60, 38, .14);
      font-size: 13px;
      font-weight: 650;
    }

    .badge.red { color: #8f352d; background: rgba(164, 63, 53, .12); }
    .badge.teal { color: #246460; background: rgba(47, 119, 116, .13); }
    .badge.blue { color: #3f5a83; background: rgba(82, 107, 148, .14); }
    .badge.gold { color: #7a5a22; background: rgba(178, 133, 56, .16); }
    .badge.green { color: #5b703d; background: rgba(104, 127, 72, .15); }

    .badge.grade {
      color: #5f5447;
      background: rgba(217, 205, 185, .44);
      border-color: rgba(78, 60, 38, .14);
    }

    .badge.tag {
      color: var(--tag-color);
      background: color-mix(in srgb, var(--tag-color) 14%, transparent);
      border-color: color-mix(in srgb, var(--tag-color) 28%, transparent);
    }

    .badge.grade,
    .grade-badge,
    .timeline-label .meta,
    .year-label,
    .month-label,
    .zoom-readout {
      font-family: var(--num);
      font-variant-numeric: oldstyle-nums tabular-nums;
    }

    .timeline-view {
      height: calc(100vh - 70px);
      min-height: 640px;
      overflow: hidden;
    }

    .timeline-shell {
      position: relative;
      height: 100%;
      max-width: none;
      margin: 0;
    }

    .timeline-head {
      position: absolute;
      inset: 24px 32px auto 32px;
      z-index: 20;
      display: block;
      pointer-events: none;
    }

    .timeline-locator {
      position: absolute;
      left: 0;
      top: 0;
      width: min(560px, calc(100vw - 520px));
      min-width: 420px;
      padding: 14px 16px 12px;
      pointer-events: auto;
      background: rgba(255, 250, 240, .9);
      backdrop-filter: blur(16px);
    }

    .year-jump-form {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .year-jump-form label {
      color: #554d43;
      font-size: 13px;
      font-weight: 800;
      white-space: nowrap;
    }

    .year-jump-input {
      width: 92px;
      height: 36px;
      border: 1px solid rgba(78, 60, 38, .18);
      border-radius: 10px;
      background: rgba(255, 250, 240, .8);
      color: var(--ink);
      padding: 0 11px;
      font-family: var(--num);
      font-variant-numeric: oldstyle-nums tabular-nums;
    }

    .year-jump-input:focus {
      border-color: rgba(47, 119, 116, .38);
      box-shadow: 0 0 0 3px rgba(47, 119, 116, .1);
      outline: none;
    }

    .year-jump-button {
      height: 36px;
      border: 1px solid rgba(47, 119, 116, .26);
      border-radius: 10px;
      background: rgba(47, 119, 116, .09);
      color: var(--teal);
      padding: 0 13px;
      cursor: pointer;
      font-weight: 800;
    }

    .year-jump-button:hover {
      background: rgba(47, 119, 116, .15);
      transform: translateY(-1px);
    }

    .viewport-years {
      margin-left: auto;
      color: var(--muted);
      font-family: var(--num);
      font-size: 12px;
      font-variant-numeric: oldstyle-nums tabular-nums;
      white-space: nowrap;
    }

    .era-shortcuts {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 10px;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .era-shortcuts::-webkit-scrollbar { display: none; }

    .era-shortcut {
      flex: 0 0 auto;
      min-height: 27px;
      border: 1px solid rgba(78, 60, 38, .14);
      border-radius: 999px;
      background: rgba(255, 250, 240, .64);
      color: #625a50;
      padding: 4px 9px;
      cursor: pointer;
      font-family: var(--num);
      font-size: 12px;
      transition: transform .16s ease, background .16s ease, border-color .16s ease, color .16s ease;
    }

    .era-shortcut:hover {
      border-color: rgba(47, 119, 116, .3);
      background: rgba(47, 119, 116, .08);
      color: var(--teal);
      transform: translateY(-1px);
    }

    .filters {
      position: absolute;
      right: 0;
      top: 0;
      width: min(420px, calc(100vw - 64px));
      max-height: calc(100vh - 132px);
      overflow: auto;
      padding: 16px;
      background: rgba(255, 250, 240, .9);
      backdrop-filter: blur(18px);
      pointer-events: auto;
      border-color: rgba(78, 60, 38, .16);
    }

    .filter-toggle {
      border: 1px solid rgba(78, 60, 38, .14);
      border-radius: 999px;
      background: rgba(255, 250, 240, .75);
      color: #514a40;
      min-height: 28px;
      padding: 4px 10px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 750;
      transition: transform .16s ease, background .16s ease, border-color .16s ease, color .16s ease;
    }

    .filter-toggle:hover {
      border-color: rgba(31, 36, 33, .26);
      background: rgba(47, 119, 116, .08);
      color: var(--teal);
      transform: translateY(-1px);
    }

    .filters.collapsed {
      width: auto;
      min-width: 174px;
      overflow: visible;
    }

    .filters.collapsed .filter-body {
      display: none;
    }

    .filter-block + .filter-block {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid rgba(78, 60, 38, .12);
    }

    .filter-label {
      display: block;
      margin-bottom: 8px;
      color: #554d43;
      font-size: 13px;
      font-weight: 750;
    }

    .country-filter {
      width: 100%;
      height: 38px;
      border: 1px solid rgba(78, 60, 38, .18);
      border-radius: 999px;
      background: rgba(255, 250, 240, .7);
      color: var(--ink);
      padding: 0 14px;
      outline: none;
    }

    .country-filter:focus {
      border-color: rgba(47, 119, 116, .38);
      box-shadow: 0 0 0 3px rgba(47, 119, 116, .1);
    }

    .legend {
      margin-top: 14px;
      border-top: 1px solid rgba(78, 60, 38, .12);
      padding-top: 12px;
      color: #554d43;
    }

    .legend summary {
      cursor: pointer;
      font-weight: 750;
      margin-bottom: 10px;
    }

    .legend-row {
      display: flex;
      flex-wrap: wrap;
      gap: 9px 12px;
      margin-bottom: 10px;
      font-size: 13px;
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .legend-swatch {
      width: 14px;
      height: 14px;
      border-radius: 4px;
      background: var(--teal);
    }

    .legend-node {
      display: inline-block;
      border-radius: 50%;
      background: var(--gold);
      position: relative;
    }

    .legend-node.s {
      width: 18px;
      height: 18px;
      box-shadow: 0 0 0 6px color-mix(in srgb, var(--gold) 22%, transparent);
    }

    .legend-node.a, .legend-node.b {
      width: 14px;
      height: 14px;
    }

    .legend-node.b::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--panel);
      transform: translate(-50%, -50%);
    }

    .legend-node.c {
      width: 10px;
      height: 10px;
    }

    .legend-note {
      color: var(--muted);
      font-size: 12px;
      margin: 0;
    }

    .filter-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 12px;
      gap: 12px;
    }

    .filters.collapsed .filter-row {
      margin-bottom: 0;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      border: 1px solid rgba(78, 60, 38, .15);
      border-radius: 999px;
      background: rgba(255, 250, 240, .66);
      color: #554d43;
      min-height: 32px;
      padding: 6px 12px;
      cursor: pointer;
      transition: background .16s ease, transform .16s ease, border-color .16s ease;
      box-shadow: inset 0 1px 0 rgba(255, 250, 240, .55);
    }

    .chip.active {
      color: var(--chip-color, var(--teal));
      background: color-mix(in srgb, var(--chip-color, var(--teal)) 14%, transparent);
      border-color: color-mix(in srgb, var(--chip-color, var(--teal)) 42%, transparent);
      font-weight: 700;
      box-shadow: inset 0 1px 0 rgba(255, 250, 240, .55), 0 4px 12px rgba(42, 35, 26, .05);
    }

    .chip:hover {
      transform: translateY(-1px);
      border-color: rgba(31, 36, 33, .24);
    }

    .timeline-toolbar {
      position: absolute;
      right: 32px;
      bottom: 92px;
      z-index: 20;
      height: 56px;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 12px;
      border: 1px solid rgba(78, 60, 38, .12);
      border-radius: 999px;
      background: rgba(255, 250, 240, .88);
      backdrop-filter: blur(16px);
      box-shadow: 0 12px 32px rgba(42, 35, 26, .1);
      padding: 0 14px;
    }

    .icon-btn {
      width: 34px;
      height: 34px;
      border: 1px solid rgba(78, 60, 38, .16);
      border-radius: 10px;
      background: rgba(255, 250, 240, .74);
      cursor: pointer;
      font-weight: 800;
      color: #514a40;
      box-shadow: inset 0 1px 0 rgba(255, 250, 240, .58);
      transition: transform .16s ease, background .16s ease, border-color .16s ease, color .16s ease;
    }

    .icon-btn:hover {
      border-color: rgba(47, 119, 116, .28);
      background: rgba(47, 119, 116, .08);
      color: var(--teal);
      transform: translateY(-1px);
    }

    .zoom-readout {
      color: var(--muted);
      font-size: 14px;
      min-width: 118px;
    }

    .timeline-frame {
      position: relative;
      height: 100%;
      overflow-x: auto;
      overflow-y: auto;
      border: 0;
      border-radius: 0;
      background:
        radial-gradient(circle at 50% 0%, rgba(178, 133, 56, .07), transparent 34%),
        linear-gradient(90deg, rgba(31, 36, 33, .018) 1px, transparent 1px),
        radial-gradient(circle at 30% 18%, rgba(31, 36, 33, .02) .7px, transparent .95px),
        var(--panel);
      background-size: auto, 26px 100%, 6px 6px, auto;
      box-shadow: none;
      scroll-behavior: smooth;
      touch-action: pan-x pan-y;
      scrollbar-color: var(--teal) rgba(217, 205, 185, .7);
      scrollbar-width: thin;
    }

    .timeline-frame::-webkit-scrollbar {
      height: 10px;
    }

    .timeline-frame::-webkit-scrollbar-track {
      background: rgba(217, 205, 185, .7);
      border-radius: 999px;
    }

    .timeline-frame::-webkit-scrollbar-thumb {
      background: var(--teal);
      border-radius: 999px;
      border: 2px solid rgba(255, 250, 240, .72);
    }

    .timeline-canvas {
      position: relative;
      height: 100%;
      min-width: 1280px;
    }

    .axis {
      position: absolute;
      left: 70px;
      right: 70px;
      top: 330px;
      height: 3px;
      border-radius: 99px;
      background: linear-gradient(90deg, rgba(95, 84, 71, .4), #5f5447 8%, #5f5447 92%, rgba(95, 84, 71, .4));
    }

    .year-line {
      position: absolute;
      top: 150px;
      height: 370px;
      width: 1.5px;
      background: rgba(95, 84, 71, .2);
    }

    .year-label {
      position: absolute;
      top: 352px;
      transform: translateX(-50%);
      color: #7a7065;
      font-family: var(--num);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .03em;
    }

    .year-tick {
      position: absolute;
      top: 308px;
      width: 1px;
      height: 28px;
      background: rgba(95, 84, 71, .72);
    }

    .month-tick {
      position: absolute;
      top: 316px;
      width: 1px;
      height: 14px;
      background: rgba(95, 84, 71, .32);
    }

    .month-label {
      position: absolute;
      top: 337px;
      transform: translateX(-50%);
      color: var(--muted);
      font-family: var(--num);
      font-size: 10px;
    }

    .timeline-overview {
      position: absolute;
      left: 36px;
      right: 36px;
      bottom: 24px;
      height: 48px;
      z-index: 20;
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 14px;
      padding: 0 18px;
      border: 1px solid rgba(78, 60, 38, .12);
      border-radius: 999px;
      background: rgba(255, 250, 240, .88);
      box-shadow: 0 12px 32px rgba(42, 35, 26, .1);
      backdrop-filter: blur(16px);
    }

    .overview-label,
    .overview-range {
      color: var(--muted);
      font-size: 12px;
      font-weight: 750;
      white-space: nowrap;
    }

    .overview-range {
      font-family: var(--num);
      font-variant-numeric: oldstyle-nums tabular-nums;
    }

    .density-nav {
      position: relative;
      height: 22px;
      cursor: grab;
      touch-action: none;
    }

    .density-nav.dragging {
      cursor: grabbing;
    }

    .density-track {
      position: absolute;
      left: 0;
      right: 0;
      top: 8px;
      height: 6px;
      border-radius: 999px;
      background: rgba(95, 84, 71, .13);
      box-shadow: inset 0 0 0 1px rgba(95, 84, 71, .12);
      overflow: hidden;
    }

    .density-bin {
      position: absolute;
      top: 0;
      bottom: 0;
      min-width: 1px;
      background: linear-gradient(180deg, var(--red), var(--gold));
      opacity: calc(.18 + var(--density) * .58);
    }

    .density-window {
      position: absolute;
      top: 4px;
      height: 14px;
      border: 1px solid rgba(31, 36, 33, .38);
      border-radius: 999px;
      background: rgba(255, 250, 240, .42);
      box-shadow: 0 4px 10px rgba(42, 35, 26, .1);
      pointer-events: none;
    }

    .node {
      position: absolute;
      top: 318px;
      transform: translate(-50%, -50%);
      border: 0;
      background: transparent;
      padding: 0;
      cursor: pointer;
      z-index: 5;
    }

    .node .dot {
      transition: transform .16s ease, box-shadow .16s ease;
    }

    .node:hover .dot {
      transform: scale(1.42);
    }

    .dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--main-color);
      border: 2px solid var(--sub-color, transparent);
      box-shadow: 0 0 0 2px var(--panel), 0 6px 14px rgba(65, 48, 28, .14);
      position: relative;
    }

    .node[data-level="S"] .dot {
      width: 18px;
      height: 18px;
      box-shadow: 0 0 0 2px var(--panel), 0 0 0 8px color-mix(in srgb, var(--main-color) 22%, transparent), 0 8px 18px rgba(65, 48, 28, .16);
    }

    .node[data-level="B"] .dot::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--panel);
      transform: translate(-50%, -50%);
    }

    .node[data-level="C"] .dot {
      width: 10px;
      height: 10px;
    }

    .node.selected .dot {
      box-shadow: 0 0 0 4px rgba(164, 63, 53, .18), 0 0 0 1.5px rgba(164, 63, 53, .42), 0 8px 18px rgba(65, 48, 28, .18);
    }

    .timeline-label {
      position: absolute;
      width: 168px;
      min-height: 54px;
      padding: 9px 11px 9px 14px;
      border: 1px solid rgba(78, 60, 38, .16);
      border-left: 3px solid var(--main-color);
      border-radius: 10px;
      background:
        linear-gradient(rgba(255, 250, 240, .94), rgba(255, 250, 240, .9)),
        radial-gradient(circle at 22% 32%, rgba(31, 36, 33, .025) .7px, transparent .95px);
      background-size: auto, 6px 6px;
      box-shadow: 0 7px 16px rgba(65, 48, 28, .07);
      text-align: left;
      color: var(--ink);
      cursor: pointer;
      z-index: 4;
      transition: transform .16s ease, border-color .16s ease, box-shadow .16s ease;
    }

    .timeline-label:hover {
      transform: translateY(-5px);
      border-color: rgba(164, 63, 53, .34);
      box-shadow: 0 16px 34px rgba(42, 35, 26, .13);
    }

    .timeline-label.selected {
      border-color: rgba(164, 63, 53, .44);
      box-shadow: 0 12px 26px rgba(164, 63, 53, .12);
    }

    .timeline-label .meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      color: rgba(95, 84, 71, .78);
      font-size: 11px;
      line-height: 1.15;
      margin-bottom: 7px;
      font-family: var(--num);
      font-weight: 650;
    }

    .timeline-label .meta span:first-child {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .grade-badge {
      border-radius: 999px;
      background: var(--line);
      color: #554d43;
      padding: 2px 7px;
      font-size: 11px;
      font-weight: 750;
      font-family: var(--num);
      white-space: nowrap;
    }

    .timeline-label strong {
      display: block;
      font-family: var(--serif);
      font-weight: 760;
      font-size: 14px;
      line-height: 1.32;
      color: #202a27;
      text-wrap: auto;
      word-break: keep-all;
      overflow-wrap: break-word;
    }

    .timeline-label .summary {
      display: none;
      margin: 9px 0 0;
      padding-top: 8px;
      border-top: 1px solid rgba(78, 60, 38, .12);
      background: transparent;
      box-shadow: none;
      color: #5d554b;
      font-size: 12px;
      line-height: 1.55;
    }

    .timeline-label:hover {
      width: 230px;
      z-index: 9;
    }

    .timeline-label:hover .summary {
      display: block;
    }

    .timeline-connector {
      position: absolute;
      width: 1px;
      background: rgba(95, 84, 71, .24);
      z-index: 1;
    }

    .overlap-link {
      position: absolute;
      width: 1px;
      height: 20px;
      background: rgba(95, 84, 71, .24);
      z-index: 1;
    }

    .range {
      position: absolute;
      height: 24px;
      border-radius: 999px;
      border: 1px solid var(--main-color);
      background: color-mix(in srgb, var(--main-color) 35%, transparent);
      color: var(--ink);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 760;
      font-family: var(--serif);
      letter-spacing: .01em;
      z-index: 2;
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      padding: 0 16px;
    }

    .range-tip {
      display: none;
      position: fixed;
      left: var(--tip-x, 0);
      top: var(--tip-y, 0);
      width: 230px;
      border-left: 3px solid var(--main-color);
      border-radius: 10px;
      background:
        linear-gradient(rgba(255, 250, 240, .94), rgba(255, 250, 240, .9)),
        radial-gradient(circle at 22% 32%, rgba(31, 36, 33, .025) .7px, transparent .95px);
      background-size: auto, 6px 6px;
      box-shadow: 0 16px 34px rgba(42, 35, 26, .13);
      padding: 10px 12px;
      text-align: left;
      white-space: normal;
      color: var(--ink);
      z-index: 10;
      pointer-events: none;
    }

    .range-tip .meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      color: rgba(95, 84, 71, .78);
      font-size: 11px;
      line-height: 1.15;
      margin-bottom: 7px;
      font-family: var(--num);
      font-weight: 650;
    }

    .range:hover {
      z-index: 9;
      overflow: visible;
    }

    .range:hover .range-tip {
      display: block;
    }

    .range-tip strong {
      display: block;
      font-family: var(--serif);
      font-size: 14px;
      line-height: 1.32;
      color: #202a27;
    }

    .range-tip .summary {
      display: block;
      color: #5d554b;
      font-size: 12px;
      line-height: 1.55;
      margin-top: 9px;
      padding-top: 8px;
      border-top: 1px solid rgba(78, 60, 38, .12);
    }

    .float-item {
      position: absolute;
      padding: 9px 13px;
      border: 1px dashed rgba(82, 107, 148, .48);
      border-radius: 999px;
      background: rgba(82, 107, 148, .09);
      color: #3f5a83;
      font-size: 14px;
      font-weight: 650;
      cursor: pointer;
      z-index: 2;
    }

    .detail-view {
      max-width: 1180px;
      margin: 0 auto;
      padding: 42px 28px 70px;
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 34px;
    }

    .detail-exit {
      position: fixed;
      left: 28px;
      top: 88px;
      z-index: 30;
      height: 38px;
      display: none;
      align-items: center;
      gap: 8px;
      border: 1px solid rgba(78, 60, 38, .16);
      border-radius: 999px;
      background: rgba(255, 250, 240, .74);
      color: #514a40;
      padding: 0 14px;
      cursor: pointer;
      font-weight: 750;
      box-shadow: 0 12px 28px rgba(42, 35, 26, .1);
      backdrop-filter: blur(12px);
      transition: transform .16s ease, background .16s ease, border-color .16s ease, color .16s ease;
    }

    #detail.active .detail-exit {
      display: inline-flex;
    }

    .detail-exit:hover {
      border-color: rgba(164, 63, 53, .3);
      color: #8f352d;
      background: rgba(164, 63, 53, .07);
      transform: translateY(-1px);
    }

    .card-hall {
      max-width: 1180px;
      margin: 0 auto;
      padding: 54px 28px 86px;
    }

    .hall-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 28px;
    }

    .hall-header h1 {
      margin: 0 0 12px;
      font-size: 48px;
      line-height: 1.08;
      color: #202a27;
    }

    .hall-header p {
      margin: 0;
      max-width: 720px;
      color: #514a40;
      font-size: 17px;
      line-height: 1.75;
    }

    .hall-layout {
      display: grid;
      grid-template-columns: 296px 1fr;
      gap: 24px;
      align-items: start;
    }

    .hall-panel {
      position: sticky;
      top: 88px;
      display: grid;
      gap: 14px;
      max-height: calc(100vh - 112px);
      overflow: auto;
    }

    .hall-reset {
      height: 38px;
      border: 1px solid rgba(78, 60, 38, .16);
      border-radius: 999px;
      background: rgba(255, 250, 240, .74);
      color: #514a40;
      cursor: pointer;
      font-weight: 750;
      transition: transform .16s ease, background .16s ease, border-color .16s ease, color .16s ease;
    }

    .hall-reset:hover {
      border-color: rgba(164, 63, 53, .28);
      color: #8f352d;
      background: rgba(164, 63, 53, .07);
      transform: translateY(-1px);
    }

    .hall-result-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
      color: var(--muted);
      font-family: var(--num);
      font-weight: 700;
    }

    .hall-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .hall-card {
      cursor: pointer;
      border-left: 4px solid var(--main-color);
      transition: transform .16s ease, border-color .16s ease, box-shadow .16s ease;
    }

    .hall-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 36px rgba(42, 35, 26, .1);
    }

    .hall-card h3 {
      margin-bottom: 9px;
      font-size: 20px;
      line-height: 1.28;
      color: #202a27;
    }

    .hall-card p {
      color: #5d554b;
      line-height: 1.58;
      margin-bottom: 13px;
    }

    .hall-time {
      display: block;
      margin-bottom: 8px;
      color: rgba(95, 84, 71, .78);
      font-family: var(--num);
      font-size: 12px;
      font-weight: 650;
    }

    .search-view {
      max-width: 1080px;
      margin: 0 auto;
      padding: 42px 28px 80px;
    }

    .search-view h1 {
      font-size: 42px;
      margin-bottom: 8px;
      font-weight: 850;
      color: #202a27;
    }

    .search-meta {
      color: var(--muted);
      margin-bottom: 18px;
    }

    .search-filter {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 24px;
    }

    .search-filter button {
      min-height: 34px;
      border: 1px solid rgba(78, 60, 38, .15);
      border-radius: 999px;
      background: rgba(255, 250, 240, .68);
      color: #554d43;
      padding: 6px 13px;
      cursor: pointer;
      font-weight: 700;
      box-shadow: inset 0 1px 0 rgba(255, 250, 240, .55);
      transition: background .16s ease, color .16s ease, transform .16s ease, border-color .16s ease;
    }

    .search-filter button.active {
      background: rgba(47, 119, 116, .12);
      border-color: rgba(47, 119, 116, .32);
      color: var(--teal);
    }

    .search-filter button:hover {
      transform: translateY(-1px);
      border-color: rgba(31, 36, 33, .24);
    }

    .result-section {
      margin-bottom: 34px;
    }

    .result-section h2 {
      font-size: 24px;
      margin-bottom: 14px;
    }

    .result-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .result-card {
      cursor: pointer;
      transition: transform .16s ease, border-color .16s ease;
    }

    .result-card:hover {
      transform: translateY(-2px);
      border-color: rgba(164, 63, 53, .3);
      box-shadow: 0 16px 36px rgba(42, 35, 26, .1);
    }

    .result-card h3 {
      margin-bottom: 10px;
      font-size: 20px;
    }

    .result-card p {
      color: #5d554b;
      line-height: 1.55;
      margin-bottom: 12px;
    }

    .article h1 {
      font-size: 50px;
      line-height: 1.1;
      margin: 16px 0 18px;
      font-weight: 850;
      color: #202a27;
    }

    .summary {
      border-left: 4px solid var(--main-color, var(--red));
      background:
        linear-gradient(90deg, rgba(164, 63, 53, .085), rgba(178, 133, 56, .045)),
        radial-gradient(circle at 18% 24%, rgba(31, 36, 33, .02) .7px, transparent .95px),
        rgba(255, 250, 240, .72);
      background-size: auto, 6px 6px, auto;
      padding: 18px 20px;
      color: #4c453d;
      font-size: 19px;
      line-height: 1.65;
      margin-bottom: 22px;
      border-radius: 0 8px 8px 0;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .detail-box {
      box-shadow: 0 10px 26px rgba(42, 35, 26, .06);
    }

    .detail-box h3 {
      margin-bottom: 10px;
      color: #8f352d;
      font-size: 17px;
      font-family: var(--serif);
    }

    .detail-box p, .detail-box li {
      color: #514a40;
      line-height: 1.65;
    }

    .detail-box ul {
      padding-left: 1.2em;
      margin: 0;
    }

    .wide { grid-column: span 2; }

    .relations h2 {
      margin-top: 0;
      font-size: 21px;
    }

    .relation-card {
      border-left: 4px solid var(--teal);
      margin-bottom: 12px;
      cursor: pointer;
      transition: transform .16s ease, border-color .16s ease;
      box-shadow: 0 10px 26px rgba(42, 35, 26, .06);
    }

    .relation-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 16px 36px rgba(42, 35, 26, .11);
    }
    .relation-card.cause { border-left-color: var(--blue); }
    .relation-card.result { border-left-color: var(--red); }
    .relation-card.opposite { border-left-color: var(--gold); }

    .relation-card h3 {
      font-size: 16px;
      margin-bottom: 8px;
    }

    .relation-card p {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
      margin: 0;
    }

    .source {
      color: #84796c;
      font-size: 13px;
      line-height: 1.5;
      margin-top: 18px;
    }

    .empty {
      padding: 30px;
      color: var(--muted);
      text-align: center;
    }

    @media (max-width: 860px) {
      .topbar { height: auto; min-height: 68px; padding: 12px 18px; align-items: flex-start; }
      .top-actions { flex-direction: column-reverse; align-items: flex-end; gap: 10px; }
      .search-box { width: min(58vw, 320px); }
      .nav { gap: 2px; }
      .nav button { padding: 8px 9px; }
      .home, .timeline-head, .detail-view, .hall-layout { grid-template-columns: 1fr; }
      .result-grid, .hall-grid { grid-template-columns: 1fr; }
      .home { padding-top: 46px; gap: 40px; }
      .hall-header { display: grid; }
      .hall-header h1 { font-size: 40px; }
      .hall-panel { position: static; max-height: none; }
      .timeline-view { padding: 24px 16px 42px; }
      .timeline-frame { height: 560px; }
      .timeline-locator { width: calc(100vw - 32px); min-width: 0; }
      .viewport-years { display: none; }
      .detail-grid { grid-template-columns: 1fr; }
      .wide { grid-column: span 1; }
      .article h1 { font-size: 40px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <button class="brand brand-home" id="brand-home" aria-label="回到首页"><span class="mark"></span>连点成线</button>
      <div class="top-actions">
        <form class="search-box" id="search-form" role="search">
          <input id="search-input" type="search" placeholder="搜索卡片" autocomplete="off" />
          <button class="search-clear" id="search-clear" type="button" aria-label="清空搜索">×</button>
          <button type="submit" aria-label="搜索">⌕</button>
        </form>
        <nav class="nav" aria-label="主导航">
          <button class="active" data-view="home">首页</button>
          <button data-view="timeline">时间轴</button>
          <button data-view="cards">知识卡片</button>
        </nav>
      </div>
    </header>

    <main>
      <section id="home" class="view active">
        <div class="home">
          <div class="home-left">
            <section>
              <h1>把历史知识点<br>连成一条线</h1>
              <p class="lead">用横向时间轴、标签筛选和结构化知识卡片，帮助历史爱好者快速看懂一段历史的主线、节奏与因果关系。</p>
              <button class="home-cta" id="home-timeline-button">进入时间轴 →</button>
            </section>
            <section id="today-section">
              <div class="section-title">
                <h2>历史上的今天</h2>
              </div>
              <div id="today-recommendation" class="cards today-slot"></div>
            </section>
          </div>
          <section class="home-recommendations">
            <div class="section-title">
              <h2>趣味推荐</h2>
            </div>
            <div id="fun-recommendations" class="cards"></div>
          </section>
        </div>
      </section>

      <section id="timeline" class="view">
        <div class="timeline-view">
          <div class="timeline-shell">
            <div class="timeline-head">
              <section class="card timeline-locator" aria-label="年份定位">
                <form class="year-jump-form" id="year-jump-form">
                  <label for="year-jump-input">定位年份</label>
                  <input class="year-jump-input" id="year-jump-input" type="number" inputmode="numeric" placeholder="1918" aria-describedby="viewport-years" />
                  <button class="year-jump-button" type="submit">前往</button>
                  <output class="viewport-years" id="viewport-years" aria-live="polite">当前视窗</output>
                </form>
                <div class="era-shortcuts" aria-label="常用年份">
                  <button class="era-shortcut" type="button" data-year="800">800</button>
                  <button class="era-shortcut" type="button" data-year="1517">1517</button>
                  <button class="era-shortcut" type="button" data-year="1815">1815</button>
                  <button class="era-shortcut" type="button" data-year="1871">1871</button>
                  <button class="era-shortcut" type="button" data-year="1918">1918</button>
                  <button class="era-shortcut" type="button" data-year="1933">1933</button>
                  <button class="era-shortcut" type="button" data-year="1945">1945</button>
                </div>
              </section>
              <aside class="card filters">
                <div class="filter-row">
                  <span>筛选</span>
                  <span id="visible-count">0 / 0</span>
                  <button class="filter-toggle" id="filter-toggle" type="button" aria-expanded="true">收起</button>
                </div>
                <div class="filter-body">
                  <div class="filter-block">
                    <span class="filter-label">标签</span>
                    <div class="chips" id="filters"></div>
                  </div>
                  <div class="filter-block">
                    <span class="filter-label">分级</span>
                    <div class="chips" id="level-filters"></div>
                  </div>
                  <div class="filter-block">
                    <label class="filter-label" for="country-filter">国家</label>
                    <input class="country-filter" id="country-filter" type="search" placeholder="输入国家或地区" autocomplete="off" />
                  </div>
                  <details class="legend" open>
                    <summary>图例</summary>
                    <div class="legend-row">
                      <span class="legend-item"><span class="legend-swatch" style="background: var(--blue)"></span>政治与制度</span>
                      <span class="legend-item"><span class="legend-swatch" style="background: var(--gold)"></span>经济与社会</span>
                      <span class="legend-item"><span class="legend-swatch" style="background: var(--red)"></span>战争与外交</span>
                      <span class="legend-item"><span class="legend-swatch" style="background: var(--teal)"></span>文化与思想</span>
                    </div>
                    <div class="legend-row">
                      <span class="legend-item"><span class="legend-node s"></span>S 级</span>
                      <span class="legend-item"><span class="legend-node a"></span>A 级</span>
                      <span class="legend-item"><span class="legend-node b"></span>B 级</span>
                      <span class="legend-item"><span class="legend-node c"></span>C 级</span>
                    </div>
                    <p class="legend-note">填色=主标签，外环=副标签，形状/大小=分级</p>
                  </details>
                </div>
              </aside>
            </div>
            <div class="timeline-toolbar">
              <button class="icon-btn" id="zoom-out" aria-label="缩小">−</button>
              <input id="zoom-slider" type="range" min="0.45" max="8" value="1.75" step="0.05" aria-label="缩放" />

              <div class="timeline-canvas" id="timeline-canvas">

            </div>
            <span class="badge teal" id="card-hall-total">0 张卡片</span>
          </header>
          <div class="hall-layout">
            <aside class="card hall-panel">
              <label class="filter-label" for="card-hall-search">搜索</label>
              <input class="country-filter" id="card-hall-search" type="search" placeholder="搜索标题、年份或正文" autocomplete="off" />
              <div class="filter-block">
                <span class="filter-label">类型</span>
                <div class="chips" id="card-hall-type-filters"></div>
              </div>
              <div class="filter-block">
                <span class="filter-label">标签</span>
                <div class="chips" id="card-hall-tag-filters"></div>
              </div>
              <div class="filter-block">
                <span class="filter-label">分级</span>
                <div class="chips" id="card-hall-level-filters"></div>
              </div>
              <div class="filter-block">
                <label class="filter-label" for="card-hall-country">国家</label>
                <input class="country-filter" id="card-hall-country" type="search" placeholder="输入国家或地区" autocomplete="off" />

              <button class="hall-reset" id="card-hall-reset" type="button">清空筛选</button>

        <div class="detail-view">
          <button class="detail-exit" id="detail-exit">← 退出</button>

          <aside class="relations" id="detail-relations"></aside>
        </div>

      <section id="search" class="view">
        <div class="search-view">
          <h1>搜索结果</h1>
          <p class="search-meta" id="search-meta"></p>
          <div class="search-filter" id="search-filter" aria-label="搜索结果筛选"></div>
          <section class="result-section">
            <div class="result-grid" id="search-results"></div>
