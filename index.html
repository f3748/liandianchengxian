  </div>

  <script src="cards-data.js"></script>
  <script>
    const tags = ["政治与制度", "经济与社会", "战争与外交", "文化与思想"];
    const levels = ["S", "A", "B", "C"];
    let activeTags = new Set();
    let activeLevels = null;
    let activeCountryQuery = "";
    let timelineStart = new Date("1914-01-01").getTime();
    let timelineEnd = new Date("1933-01-31").getTime();
    const defaultZoom = 1.1;
    let zoom = defaultZoom;
    let selectedId = "card7";
    let previousView = "home";

    const cards = window.CARD_DATA.cards;

    const extraHistoryCards = window.CARD_DATA.extraHistoryCards;

    const proverbCards = window.CARD_DATA.proverbCards;

    const allCards = [...cards, ...extraHistoryCards, ...proverbCards];
    const timelineCards = buildTimelineCards(allCards);
    const timelineExtent = timelineRange(timelineCards);
    timelineStart = timelineExtent.start;
    timelineEnd = timelineExtent.end;

    const byId = Object.fromEntries(allCards.map(card => [card.id, card]));

    const views = document.querySelectorAll(".view");
    const navButtons = document.querySelectorAll(".nav button");
    const timelineFrame = document.getElementById("timeline-frame");
    const timelineCanvas = document.getElementById("timeline-canvas");
    const timelineOverview = document.getElementById("timeline-overview");
    const visibleCount = document.getElementById("visible-count");
    const zoomSlider = document.getElementById("zoom-slider");
    const zoomReadout = document.getElementById("zoom-readout");
    const yearJumpForm = document.getElementById("year-jump-form");
    const yearJumpInput = document.getElementById("year-jump-input");
    const viewportYears = document.getElementById("viewport-years");
    const levelFilters = document.getElementById("level-filters");
    const countryFilter = document.getElementById("country-filter");
    const filtersPanel = document.querySelector(".filters");
    const filterToggle = document.getElementById("filter-toggle");
    const searchInput = document.getElementById("search-input");
    const searchBox = document.getElementById("search-form");
    const searchClear = document.getElementById("search-clear");
    let currentQuery = "";
    let activeSearchFilter = "all";
    let hallQuery = "";
    let hallCountryQuery = "";
    const hallActiveTypes = new Set();
    const hallActiveTags = new Set();
    const hallActiveLevels = new Set();
    const detailBackStack = [];
    let detailReturnState = null;

    function currentViewName() {
      return document.querySelector(".view.active")?.id || "home";
    }

    function captureViewState(view = currentViewName()) {
      return {
        view,
        windowY: window.scrollY || window.pageYOffset || 0,
        timelineLeft: timelineFrame.scrollLeft,
        timelineTop: timelineFrame.scrollTop
      };
    }

    function restoreViewState(state) {
      if (!state) return;
      if (state.view === "timeline") {
        timelineFrame.scrollLeft = state.timelineLeft || 0;
        timelineFrame.scrollTop = state.timelineTop || 0;
        updateDensityWindow();
      }
      window.scrollTo({ top: state.windowY || 0, behavior: "auto" });
    }

    function showView(name, options = {}) {
      const current = document.querySelector(".view.active")?.id || "home";
      if (name === "search" && current !== "search" && !options.restoreState) previousView = current;
      views.forEach(view => view.classList.toggle("active", view.id === name));
      const navTarget = name === "detail" ? "cards" : name;
      navButtons.forEach(btn => btn.classList.toggle("active", btn.dataset.view === navTarget));
      if (name === "home" && !options.skipHomeRefresh) renderRecommendations();
      if (name === "timeline") {
        if (activeLevels === null) renderLevelFilters();
        renderTimeline();
      }
      if (name === "cards") renderCardHall();
      if (options.restoreState) {
        restoreViewState(options.restoreState);
      } else if (!options.preserveScroll) {
        window.scrollTo({ top: 0, behavior: "smooth" });
      }
    }

    navButtons.forEach(btn => btn.addEventListener("click", () => showView(btn.dataset.view)));
    document.getElementById("brand-home").addEventListener("click", () => showView("home"));
    document.getElementById("home-timeline-button").addEventListener("click", () => showView("timeline"));
    document.getElementById("detail-exit").addEventListener("click", () => {
      const previousCard = detailBackStack.pop();
      if (previousCard) {
        setSelected(previousCard, "detail", { resetDetailStack: false });
      } else {
        const targetState = detailReturnState || { view: "timeline" };
        detailReturnState = null;
        showView(targetState.view || "timeline", {
          restoreState: targetState,
          skipHomeRefresh: targetState.view === "home"
        });
      }
    });
    document.getElementById("search-form").addEventListener("submit", event => {
      event.preventDefault();
      currentQuery = searchInput.value.trim();
      activeSearchFilter = "all";
      updateSearchClear();
      renderSearch();
      showView("search");
    });
    searchInput.addEventListener("input", updateSearchClear);
    searchClear.addEventListener("click", () => {
      searchInput.value = "";
      currentQuery = "";
      updateSearchClear();
      showView(previousView || "home");
    });
    document.getElementById("card-hall-search").addEventListener("input", event => {
      hallQuery = event.target.value;
      renderCardHall();
    });
    document.getElementById("card-hall-country").addEventListener("input", event => {
      hallCountryQuery = event.target.value;
      renderCardHall();
    });
    document.getElementById("card-hall-reset").addEventListener("click", () => {
      hallQuery = "";
      hallCountryQuery = "";
      hallActiveTypes.clear();
      hallActiveTags.clear();
      hallActiveLevels.clear();
      renderCardHall();
    });

    function updateSearchClear() {
      searchBox.classList.toggle("has-value", searchInput.value.trim().length > 0);
    }

    function dateString(year, month = 1, day = 1) {
      return `${String(year).padStart(4, "0")}-${String(month).padStart(2, "0")}-${String(day).padStart(2, "0")}`;
    }

    function endOfMonth(year, month) {
      return new Date(year, month, 0).getDate();
    }

    function fieldValue(card, label) {
      return (card.fields || []).find(field => field.label === label)?.value || "";
    }

    function parseFirstDate(text, preferEnd = false) {
      const value = String(text || "");
      const full = [...value.matchAll(/(\d{1,4})年\s*(\d{1,2})月\s*(\d{1,2})日/g)];
      if (full.length) {
        const m = preferEnd ? full[full.length - 1] : full[0];
        return dateString(Number(m[1]), Number(m[2]), Number(m[3]));
      }
      const ym = [...value.matchAll(/(\d{1,4})年\s*(\d{1,2})月/g)];
      if (ym.length) {
        const m = preferEnd ? ym[ym.length - 1] : ym[0];
        const y = Number(m[1]);
        const month = Number(m[2]);
        return dateString(y, month, preferEnd ? endOfMonth(y, month) : 15);
      }
      const year = [...value.matchAll(/(\d{1,4})年/g)];
      if (year.length) {
        const m = preferEnd ? year[year.length - 1] : year[0];
        return dateString(Number(m[1]), preferEnd ? 12 : 6, preferEnd ? 31 : 30);
      }
      return "";
    }

    function parseDateRange(text) {
      const value = String(text || "").replace(/－|–|—/g, "—");
      const patterns = [
        {
          re: /(\d{1,4})年\s*(\d{1,2})月\s*(\d{1,2})日\s*(?:至|到|—|-)\s*(\d{1,4})年\s*(\d{1,2})月\s*(\d{1,2})日/,
          build: m => [dateString(+m[1], +m[2], +m[3]), dateString(+m[4], +m[5], +m[6])]
        },
        {
          re: /(\d{1,4})年\s*(\d{1,2})月\s*(\d{1,2})\s*(?:至|到|—|-)\s*(\d{1,2})日/,
          build: m => [dateString(+m[1], +m[2], +m[3]), dateString(+m[1], +m[2], +m[4])]
        },
        {
          re: /(\d{1,4})年\s*(\d{1,2})月\s*(?:至|到|—|-)\s*(\d{1,2})月/,
          build: m => [dateString(+m[1], +m[2], 15), dateString(+m[1], +m[3], endOfMonth(+m[1], +m[3]))]
        },
        {
          re: /(\d{1,4})年\s*(\d{1,2})月\s*(?:至|到|—|-)\s*(\d{1,4})年/,
          build: m => [dateString(+m[1], +m[2], 15), dateString(+m[3], 12, 31)]
        },
        {
          re: /(\d{1,4})年\s*(?:至|到|—|-)\s*(\d{1,4})年\s*(\d{1,2})月/,
          build: m => [dateString(+m[1], 6, 30), dateString(+m[2], +m[3], endOfMonth(+m[2], +m[3]))]
        },
        {
          re: /(\d{1,4})\s*(?:年)?\s*(?:至|到|—|-)\s*(\d{1,4})年/,
          build: m => [dateString(+m[1], 6, 30), dateString(+m[2], 12, 31)]
        }
      ];
      for (const pattern of patterns) {
        const match = value.match(pattern.re);
        if (!match) continue;
        const [startDate, endDate] = pattern.build(match);
        if (new Date(endDate).getTime() >= new Date(startDate).getTime()) return { startDate, endDate };
      }
      return null;
    }

    function yearsBetween(startDate, endDate) {
      return Math.abs(new Date(endDate).getTime() - new Date(startDate).getTime()) / (365.25 * 24 * 60 * 60 * 1000);
    }

    function shouldKeepTimelineRange(card, startDate, endDate) {
      const title = card.title || "";
      const time = card.timeText || fieldValue(card, "时间");
      const text = `${title} ${time}`;
      const duration = yearsBetween(startDate, endDate);
      const eventLike = /战争|革命|会议|起义|战役|攻势|危机|运动|竞赛|封锁|审判|选举|政变|罢工|占领|合并|成立|投降|屠杀|种族灭绝|谈判|冲突/.test(text);
      const documentLike = /条约|协定|和约|公约|计划|法案|改革|决议|宪法|协议|法令|赔款|禁令/.test(text);

      if (card.type === "事件卡") return true;
      if (card.type === "组织/机构卡") return false;
      if (card.type === "制度/文本卡") return documentLike && (duration <= 4 || /条约|协定|和约|公约|计划|法案|改革|决议|协议|法令/.test(title));
      if (card.type === "作品卡") return false;
      return eventLike || (documentLike && duration <= 3);
    }

    function inferTimelineData(card) {
      if (card.kind === "range" && card.startDate && card.endDate) return { kind: "range", startDate: card.startDate, endDate: card.endDate };
      if (card.date) return { kind: "point", date: card.date };
      const timelineOverride = fieldValue(card, "上时间轴").trim();
      if (/^(否|不|no|false)$/i.test(timelineOverride)) return null;
      const explicitlyIncluded = /^(是|yes|true)$/i.test(timelineOverride);
      const defaultTypeAllowed = card.type === "事件卡" || card.type === "制度/文本卡";
      const organizationMilestone = card.type === "组织/机构卡" && /成立|建立/.test(card.title || "");
      if (!explicitlyIncluded && !defaultTypeAllowed && !organizationMilestone) return null;
      const time = card.timeText || fieldValue(card, "时间");
      const isRangeLike = /至|到|—|-|成立.*解体|陆续出版|连载|第一卷|第二卷|拍摄制作/.test(time);
      if (isRangeLike && !/后流行|以来|沿用至今/.test(time)) {
        const parsedRange = parseDateRange(time);
        const startDate = parsedRange?.startDate || parseFirstDate(time);
        const endDate = parsedRange?.endDate || parseFirstDate(time, true);
        if (startDate && endDate && startDate !== endDate) {
          if (!shouldKeepTimelineRange(card, startDate, endDate)) return null;
          return { kind: "range", startDate, endDate };
        }
      }
      const date = parseFirstDate(time);
      if (!date) return null;
      return { kind: "point", date };
    }

    function buildTimelineCards(sourceCards) {
      return sourceCards.map(card => {
        const timeline = inferTimelineData(card);
        return timeline ? { ...card, ...timeline } : null;
      }).filter(Boolean);
    }

    function positionRangeTip(event) {
      const margin = 14;
      const tipWidth = 230;
      const tipHeight = 132;
      const x = Math.min(event.clientX + margin, window.innerWidth - tipWidth - margin);
      const y = Math.min(event.clientY + margin, window.innerHeight - tipHeight - margin);
      event.currentTarget.style.setProperty("--tip-x", `${Math.max(margin, x)}px`);
      event.currentTarget.style.setProperty("--tip-y", `${Math.max(margin, y)}px`);
    }

    function timelineRange(items) {
      const values = items.flatMap(card => card.kind === "range" ? [card.startDate, card.endDate] : [card.date])
        .map(date => new Date(date).getTime())
        .filter(Number.isFinite);
      if (!values.length) return { start: new Date("1914-01-01").getTime(), end: new Date("1933-01-31").getTime() };
      const startDate = new Date(Math.min(...values));
      const endDate = new Date(Math.max(...values));
      return {
        start: new Date(dateString(startDate.getFullYear() - 1, 1, 1)).getTime(),
        end: new Date(dateString(endDate.getFullYear() + 1, 12, 31)).getTime()
      };
    }

    function pctForDate(dateText) {
      const value = new Date(dateText).getTime();
      return Math.max(0, Math.min(1, (value - timelineStart) / (timelineEnd - timelineStart)));
    }

    function timelinePixelWidth() {
      const totalYears = Math.max(1, (timelineEnd - timelineStart) / (365.25 * 24 * 60 * 60 * 1000));
      return Math.round(Math.max(1600, totalYears * 54) * zoom);
    }

    function axisWidthEstimate() {
      return Math.max(1, timelinePixelWidth() - 140);
    }

    function xForDate(dateText) {
      const width = axisWidthEstimate();
      return 70 + pctForDate(dateText) * width;
    }

    function tagColor(tag) {
      return {
        "政治与制度": "var(--blue)",
        "经济与社会": "var(--gold)",
        "战争与外交": "var(--red)",
        "文化与思想": "var(--teal)"
      }[tag] || "var(--green)";
    }

    function htmlEscape(value) {
      return String(value || "").replace(/[&<>"']/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      }[char]));
    }

    function highlightText(text, query) {
      const safe = htmlEscape(text);
      if (!query) return safe;
      const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
      return safe.replace(new RegExp(escaped, "gi"), match => `<mark>${match}</mark>`);
    }

    function tagBadgeHtml(tag) {
      return `<span class="badge tag" style="--tag-color: ${tagColor(tag)}">${htmlEscape(tag)}</span>`;
    }

    function hasActiveTag(card) {
      return activeTags.size === 0 || card.tags.some(tag => activeTags.has(tag));
    }

    function hasActiveLevel(card, baseCards = timelineCards) {
      if (activeLevels) return activeLevels.has(card.level);
      return shouldShowSemanticCard(card, baseCards);
    }

    function countryText(card) {
      return [
        card.place,
        fieldValue(card, "主要国家"),
        fieldValue(card, "地点"),
        fieldValue(card, "地区")
      ].filter(Boolean).join(" ");
    }

    function hasActiveCountry(card) {
      const query = activeCountryQuery.trim().toLowerCase();
      return !query || countryText(card).toLowerCase().includes(query);
    }

    function setSelected(id, view = "detail", options = {}) {
      if (options.fromRelation && selectedId && selectedId !== id) detailBackStack.push(selectedId);
      if (options.resetDetailStack !== false && !options.fromRelation) detailBackStack.length = 0;
      if (view === "detail" && !options.fromRelation && options.resetDetailStack !== false) {
        const current = currentViewName();
        if (current !== "detail") detailReturnState = captureViewState(current);
      }
      selectedId = id;
      renderTimeline();
      renderDetail();
      if (view) showView(view);
    }

    function randomItem(pool, excludeIds = new Set()) {
      const available = pool.filter(card => !excludeIds.has(card.id));
      if (!available.length) return null;
      return available[Math.floor(Math.random() * available.length)];
    }

    function monthDayFor(card) {
      if (card.date && /^\d{4}-\d{2}-\d{2}$/.test(card.date)) return card.date.slice(5);
      const text = [card.timeText, card.fields?.find(field => field.label === "时间")?.value].filter(Boolean).join(" ");
      const match = text.match(/\d{3,4}年\s*(\d{1,2})月\s*(\d{1,2})日/);
      if (!match) return "";
      return `${String(match[1]).padStart(2, "0")}-${String(match[2]).padStart(2, "0")}`;
    }

    function recommendationCard(card) {
      return `
        <article class="card rec-card" data-card="${card.id}">
          <h3>${htmlEscape(card.title)}</h3>
          <p>${htmlEscape(card.summary)}</p>
          <div class="badges">
            ${card.level ? `<span class="badge red grade">${card.level} 级</span>` : ""}
            ${(card.tags || []).slice(0, 1).map(tag => tagBadgeHtml(tag)).join("")}
            <span class="badge">${htmlEscape(card.type)}</span>
          </div>
        </article>
      `;
    }

    function renderRecommendations() {
      const todayContainer = document.getElementById("today-recommendation");
      const funContainer = document.getElementById("fun-recommendations");
      const historyPool = [...cards, ...extraHistoryCards];
      const proverbPool = allCards.filter(card => card.type === "俗语卡");
      const workPool = allCards.filter(card => card.type === "作品卡");
      const today = new Date();
      const todayKey = `${String(today.getMonth() + 1).padStart(2, "0")}-${String(today.getDate()).padStart(2, "0")}`;
      const todayMatches = historyPool.filter(card => monthDayFor(card) === todayKey);
      const todayCard = randomItem(todayMatches);
      const funCards = [
        randomItem(proverbPool),
        randomItem(workPool)
      ].filter(Boolean);

      todayContainer.innerHTML = todayCard ? recommendationCard(todayCard) : "";
      funContainer.innerHTML = funCards.map(card => recommendationCard(card)).join("");
      document.querySelectorAll("#today-recommendation [data-card], #fun-recommendations [data-card]").forEach(el => {
        el.addEventListener("click", () => setSelected(el.dataset.card, "detail"));
      });
    }

    const searchMetaFields = new Set([
      "标题",
      "分级",
      "类型",
      "标签",
      "主标签",
      "副标签",
      "地点",
      "地区",
      "国家",
      "主要国家",
      "出处",
      "资料备注"
    ]);

    function searchableContentFields(card) {
      return (card.fields || []).filter(field => {
        const label = String(field.label || "").trim();
        const value = String(field.value || "").trim();
        return value && !searchMetaFields.has(label);
      });
    }

    function textForSearch(card) {
      return [
        card.summary,
        ...searchableContentFields(card).map(field => field.value)
      ].join("\n").toLowerCase();
    }

    function matchContext(value, query) {
      const text = String(value || "");
      const lower = text.toLowerCase();
      const idx = lower.indexOf(query.toLowerCase());
      if (idx < 0) return htmlEscape(text.slice(0, 96));
      const start = Math.max(0, idx - 30);
      const end = Math.min(text.length, idx + query.length + 30);
      return `${start > 0 ? "..." : ""}${highlightText(text.slice(start, end), query)}${end < text.length ? "..." : ""}`;
    }

    function excerptFor(card, query) {
      const fields = searchableContentFields(card);
      const hit = fields.find(field => String(field.value).toLowerCase().includes(query.toLowerCase()));
      if (hit) return `${htmlEscape(hit.label)}：${matchContext(hit.value, query)}`;
      return matchContext(card.summary, query);
    }

    function resultCard(card, query, mode = "content") {
      return `
        <article class="card result-card" data-card="${card.id}">
          <h3>${mode === "title" ? highlightText(card.title, query) : htmlEscape(card.title)}</h3>
          <p>${excerptFor(card, query)}</p>
          <div class="badges">
            <span class="badge ${mode === "title" ? "blue" : "gold"}">${mode === "title" ? "标题命中" : "内容命中"}</span>
            <span class="badge red grade">${card.level} 级</span>
            <span class="badge">${card.type}</span>
            ${(card.tags || []).slice(0, 2).map(tag => tagBadgeHtml(tag)).join("")}
          </div>
        </article>
      `;
    }

    function bindResultClicks() {
      document.querySelectorAll(".result-card[data-card]").forEach(el => {
        el.addEventListener("click", () => setSelected(el.dataset.card, "detail"));
      });
    }

    function renderSearch() {
      const query = currentQuery.trim();
      const meta = document.getElementById("search-meta");
      const filterContainer = document.getElementById("search-filter");
      const resultContainer = document.getElementById("search-results");

      if (!query) {
        meta.textContent = "输入字词后，可搜索卡片标题和正文内容。";
        filterContainer.innerHTML = "";
        resultContainer.innerHTML = `<div class="card empty">暂无搜索词</div>`;
        return;
      }

      const lower = query.toLowerCase();
      const titleMatches = allCards.filter(card => card.title.toLowerCase().includes(lower));
      const titleIds = new Set(titleMatches.map(card => card.id));
      const contentMatches = allCards.filter(card => !titleIds.has(card.id) && textForSearch(card).includes(lower));
      const groups = {
        all: [
          ...titleMatches.map(card => ({ card, mode: "title" })),
          ...contentMatches.map(card => ({ card, mode: "content" }))
        ],
        title: titleMatches.map(card => ({ card, mode: "title" })),
        content: contentMatches.map(card => ({ card, mode: "content" }))
      };
      const labels = [
        ["all", `全部 ${groups.all.length}`],
        ["title", `标题匹配 ${groups.title.length}`],
        ["content", `内容匹配 ${groups.content.length}`]
      ];
      const visibleResults = groups[activeSearchFilter] || groups.all;

      meta.textContent = `“${query}”共找到 ${titleMatches.length + contentMatches.length} 张相关卡片`;
      filterContainer.innerHTML = labels.map(([key, label]) => (
        `<button type="button" class="${activeSearchFilter === key ? "active" : ""}" data-search-filter="${key}">${label}</button>`
      )).join("");
      resultContainer.innerHTML = visibleResults.length
        ? visibleResults.map(item => resultCard(item.card, query, item.mode)).join("")
        : `<div class="card empty">当前筛选没有结果</div>`;
      filterContainer.querySelectorAll("[data-search-filter]").forEach(btn => {
        btn.addEventListener("click", () => {
          activeSearchFilter = btn.dataset.searchFilter;
          renderSearch();
        });
      });
      bindResultClicks();
    }

    function cardHallTypes() {
      const preferred = ["事件卡", "人物卡", "概念/思潮卡", "制度/文本卡", "组织/机构卡", "作品卡", "俗语卡"];
      const existing = Array.from(new Set(allCards.map(card => card.type).filter(Boolean)));
      return preferred.filter(type => existing.includes(type)).concat(existing.filter(type => !preferred.includes(type)).sort());
    }

    function cardHallText(card) {
      return [
        card.title,
        card.summary,
        card.timeText,
        ...searchableContentFields(card).map(field => field.value)
      ].join("\n").toLowerCase();
    }

    function hallMatchesSet(valueSet, values) {
      return valueSet.size === 0 || values.some(value => valueSet.has(value));
    }

    function hallVisibleCards() {
      const query = hallQuery.trim().toLowerCase();
      const countryQuery = hallCountryQuery.trim().toLowerCase();
      return allCards.filter(card => {
        if (!hallMatchesSet(hallActiveTypes, [card.type])) return false;
        if (!hallMatchesSet(hallActiveTags, card.tags || [])) return false;
        if (!hallMatchesSet(hallActiveLevels, [card.level])) return false;
        if (countryQuery && !countryText(card).toLowerCase().includes(countryQuery)) return false;
        return !query || cardHallText(card).includes(query);
      });
    }

    function renderHallChips(container, values, activeSet, allText) {
      container.innerHTML = [
        `<button class="chip ${activeSet.size === 0 ? "active" : ""}" data-value="__all">${allText}</button>`,
        ...values.map(value => {
          const style = tags.includes(value) ? ` style="--chip-color: ${tagColor(value)}"` : "";
          const label = levels.includes(value) ? `${value} 级` : value;
          return `<button class="chip ${activeSet.has(value) ? "active" : ""}" data-value="${htmlEscape(value)}"${style}>${htmlEscape(label)}</button>`;
        })
      ].join("");
      container.querySelectorAll(".chip").forEach(btn => {
        btn.addEventListener("click", () => {
          const value = btn.dataset.value;
          if (value === "__all") {
            activeSet.clear();
          } else if (activeSet.has(value)) {
            activeSet.delete(value);
          } else {
            activeSet.add(value);
          }
          renderCardHall();
        });
      });
    }

    function hallCardHtml(card) {
      const mainTag = card.mainTag || card.tags?.[0] || "";
      return `
        <article class="card hall-card" data-card="${card.id}" style="--main-color: ${tagColor(mainTag)}">
          <span class="hall-time">${htmlEscape(card.timeText || "未标注时间")}</span>
          <h3>${htmlEscape(card.title)}</h3>
          <p>${htmlEscape(card.summary)}</p>
          <div class="badges">
            <span class="badge red grade">${htmlEscape(card.level)} 级</span>
            <span class="badge">${htmlEscape(card.type)}</span>
            ${(card.tags || []).slice(0, 2).map(tag => tagBadgeHtml(tag)).join("")}
          </div>
        </article>
      `;
    }

    function renderCardHall() {
      const typeContainer = document.getElementById("card-hall-type-filters");
      const tagContainer = document.getElementById("card-hall-tag-filters");
      const levelContainer = document.getElementById("card-hall-level-filters");
      const resultContainer = document.getElementById("card-hall-results");
      const count = document.getElementById("card-hall-count");
      const total = document.getElementById("card-hall-total");
      const input = document.getElementById("card-hall-search");
      const countryInput = document.getElementById("card-hall-country");
      if (!typeContainer || !resultContainer) return;

      if (input && input.value !== hallQuery) input.value = hallQuery;
      if (countryInput && countryInput.value !== hallCountryQuery) countryInput.value = hallCountryQuery;
      renderHallChips(typeContainer, cardHallTypes(), hallActiveTypes, "全部类型");
      renderHallChips(tagContainer, tags, hallActiveTags, "全部标签");
      renderHallChips(levelContainer, levels.map(level => `${level}`), hallActiveLevels, "全部分级");

      const visible = hallVisibleCards();
      count.textContent = `${visible.length} / ${allCards.length}`;
      total.textContent = `${allCards.length} 张卡片`;
      resultContainer.innerHTML = visible.length
        ? visible.map(card => hallCardHtml(card)).join("")
        : `<div class="card empty">没有符合筛选的卡片</div>`;
      resultContainer.querySelectorAll("[data-card]").forEach(el => {
        el.addEventListener("click", () => setSelected(el.dataset.card, "detail"));
      });
    }

    function renderFilters() {
      const container = document.getElementById("filters");
      const all = ["全部", ...tags];
      container.innerHTML = all.map(tag => {
        const active = tag === "全部" ? activeTags.size === 0 : activeTags.has(tag);
        const style = tag === "全部" ? "" : ` style="--chip-color: ${tagColor(tag)}"`;
        return `<button class="chip ${active ? "active" : ""}" data-filter="${tag}"${style}>${tag}</button>`;
      }).join("");
      container.querySelectorAll(".chip").forEach(btn => {
        btn.addEventListener("click", () => {
          const tag = btn.dataset.filter;
          if (tag === "全部") {
            activeTags.clear();
          } else if (activeTags.has(tag)) {
            activeTags.delete(tag);
          } else {
            activeTags.add(tag);
          }
          renderFilters();
          if (activeLevels === null) renderLevelFilters();
          renderTimeline();
        });
      });
    }

    function renderLevelFilters() {
      const semanticActive = activeLevels === null;
      levelFilters.innerHTML = [
        `<button class="chip ${semanticActive ? "active" : ""}" data-level="semantic">语义缩放 · 智能</button>`,
        ...levels.map(level => `<button class="chip ${activeLevels?.has(level) ? "active" : ""}" data-level="${level}">${level} 级</button>`)
      ].join("");
      levelFilters.querySelectorAll(".chip").forEach(btn => {
        btn.addEventListener("click", () => {
          const level = btn.dataset.level;
          if (level === "semantic") {
            activeLevels = null;
          } else {
            if (activeLevels === null) activeLevels = new Set();
            if (activeLevels.has(level)) {
              activeLevels.delete(level);
            } else {
              activeLevels.add(level);
            }
            if (activeLevels.size === 0) activeLevels = null;
          }
          renderLevelFilters();
          renderTimeline();
        });
      });
    }

    function cardsMatchingBaseFilters() {
      return timelineCards.filter(card => hasActiveTag(card) && hasActiveCountry(card));
    }

    function semanticPointX(card) {
      if (card.kind === "range") {
        return (xForDate(card.startDate) + xForDate(card.endDate)) / 2;
      }
      return xForDate(card.date);
    }

    function semanticImportance(card) {
      const base = { S: 100, A: 74, B: 46, C: 22 }[card.level] || 22;
      const typeBoost = {
        "事件卡": 6,
        "制度/文本卡": 5,
        "组织/机构卡": 4,
        "概念/思潮卡": -2,
        "作品卡": -3,
        "俗语卡": -8
      }[card.type] || 0;
      const relationBoost = Math.min(12, (card.relations?.length || 0) * 2 + (card.relationItems?.length || 0) * 0.4);
      const rangeBoost = card.kind === "range" ? 3 : 0;
      return base + typeBoost + relationBoost + rangeBoost;
    }

    function semanticCrowding(card, baseCards) {
      const x = semanticPointX(card);
      const radius = Math.max(110, Math.min(240, timelineFrame.clientWidth * 0.16));
      return baseCards.reduce((count, other) => {
        if (other.id === card.id) return count;
        return Math.abs(semanticPointX(other) - x) <= radius ? count + 1 : count;
      }, 0);
    }

    function semanticRequiredZoom(card, baseCards) {
      if (card.level === "S") return 0.45;
      const importance = semanticImportance(card);
      const crowding = semanticCrowding(card, baseCards);
      const crowdPenalty = Math.max(0, crowding - 4) * 0.13;
      const importanceDiscount = Math.max(0, importance - 50) * 0.022;
      const base = { A: 1.05, B: 1.85, C: 3.0 }[card.level] || 3.2;
      return Math.max(0.55, Math.min(7.4, base + crowdPenalty - importanceDiscount));
    }

    function shouldShowSemanticCard(card, baseCards) {
      return zoom >= semanticRequiredZoom(card, baseCards);
    }

    function semanticLevelText(baseCards = cardsMatchingBaseFilters()) {
      if (activeLevels !== null) return Array.from(activeLevels).join("");
      const shown = baseCards.filter(card => shouldShowSemanticCard(card, baseCards));
      const levelText = levels.filter(level => shown.some(card => card.level === level)).join("");
      return levelText ? `智能 ${levelText}` : "智能";
    }

    function visibleYearSpan() {
      const axisWidth = axisWidthEstimate();
      const visibleRatio = Math.min(1, timelineFrame.clientWidth / axisWidth);
      return ((timelineEnd - timelineStart) / (365.25 * 24 * 60 * 60 * 1000)) * visibleRatio;
    }

    function yearTickStep() {
      const span = visibleYearSpan();
      if (span > 90) return 10;
      if (span > 24) return 5;
      return 1;
    }

    function updateDensityWindow() {
      const nav = timelineOverview.querySelector(".density-nav");
      const windowEl = timelineOverview.querySelector(".density-window");
      if (!nav || !windowEl) return;
      const axisWidth = axisWidthEstimate();
      const visibleLeft = Math.max(0, timelineFrame.scrollLeft - 70);
      const visibleWidth = Math.min(axisWidth, timelineFrame.clientWidth);
      windowEl.style.left = `${Math.max(0, visibleLeft / axisWidth * 100)}%`;
      windowEl.style.width = `${Math.max(2, visibleWidth / axisWidth * 100)}%`;
    }

    function yearAtTimelinePixel(pixel) {
      const ratio = Math.max(0, Math.min(1, pixel / axisWidthEstimate()));
      return new Date(timelineStart + ratio * (timelineEnd - timelineStart)).getFullYear();
    }

    function updateViewportYears() {
      const axisLeft = Math.max(0, timelineFrame.scrollLeft - 70);
      const axisRight = Math.max(axisLeft, Math.min(axisWidthEstimate(), timelineFrame.scrollLeft + timelineFrame.clientWidth - 70));
      const startYear = yearAtTimelinePixel(axisLeft);
      const endYear = yearAtTimelinePixel(axisRight);
      viewportYears.textContent = startYear === endYear ? `当前视窗 ${startYear}` : `当前视窗 ${startYear}—${endYear}`;
    }

    function jumpToYear(value) {
      const minYear = new Date(timelineStart).getFullYear();
      const maxYear = new Date(timelineEnd).getFullYear();
      const requestedYear = Math.round(Number(value));
      if (!Number.isFinite(requestedYear)) {
        yearJumpInput.setCustomValidity("请输入年份");
        yearJumpInput.reportValidity();
        return;
      }
      yearJumpInput.setCustomValidity("");
      const year = Math.max(minYear, Math.min(maxYear, requestedYear));
      const targetTime = new Date(dateString(year, 7, 1)).getTime();
      const ratio = (targetTime - timelineStart) / (timelineEnd - timelineStart);
      timelineFrame.scrollLeft = Math.max(0, 70 + ratio * axisWidthEstimate() - timelineFrame.clientWidth / 2);
      yearJumpInput.value = year;
      updateDensityWindow();
      updateViewportYears();
    }

    function renderDensityNavigator(sourceCards) {
      timelineOverview.innerHTML = "";
      const label = document.createElement("span");
      label.className = "overview-label";
      label.textContent = "全局密度";
      const nav = document.createElement("div");
      nav.className = "density-nav";
      nav.setAttribute("aria-label", "时间密度导航条");
      const track = document.createElement("div");
      track.className = "density-track";
      const windowEl = document.createElement("div");
      windowEl.className = "density-window";
      const range = document.createElement("span");
      range.className = "overview-range";
      range.textContent = `${new Date(timelineStart).getFullYear()}—${new Date(timelineEnd).getFullYear()}`;
      const binCount = Math.max(48, Math.min(180, Math.round(axisWidthEstimate() / 34)));
      const bins = Array.from({ length: binCount }, () => 0);
      sourceCards.forEach(card => {
        const dates = card.kind === "range" ? [card.startDate, card.endDate] : [card.date];
        dates.forEach(date => {
          const index = Math.max(0, Math.min(binCount - 1, Math.floor(pctForDate(date) * binCount)));
          bins[index] += card.level === "S" ? 3 : card.level === "A" ? 2 : 1;
        });
      });
      const max = Math.max(1, ...bins);
      track.innerHTML = bins.map((count, index) => `
        <span class="density-bin" style="left:${index / binCount * 100}%;width:${100 / binCount}%;--density:${count / max}"></span>
      `).join("");
      nav.append(track, windowEl);
      const moveTo = event => {
        const rect = nav.getBoundingClientRect();
        const ratio = Math.max(0, Math.min(1, (event.clientX - rect.left) / rect.width));
        const targetX = ratio * axisWidthEstimate();
        timelineFrame.scrollLeft = Math.max(0, targetX + 70 - timelineFrame.clientWidth / 2);
        updateDensityWindow();
      };
      nav.addEventListener("pointerdown", event => {
        nav.classList.add("dragging");
        nav.setPointerCapture(event.pointerId);
        moveTo(event);
      });
      nav.addEventListener("pointermove", event => {
        if (!nav.classList.contains("dragging")) return;
        moveTo(event);
      });
      nav.addEventListener("pointerup", event => {
        nav.classList.remove("dragging");
        if (nav.hasPointerCapture(event.pointerId)) nav.releasePointerCapture(event.pointerId);
      });
      nav.addEventListener("pointercancel", () => nav.classList.remove("dragging"));
      timelineOverview.append(label, nav, range);
      updateDensityWindow();
    }

    function renderTimeline() {
      timelineCanvas.style.width = `${timelinePixelWidth()}px`;
      timelineCanvas.querySelectorAll(".year-line,.year-label,.year-tick,.month-tick,.month-label,.node,.range,.timeline-label,.timeline-connector,.overlap-link").forEach(el => el.remove());
      const showMonths = visibleYearSpan() <= 3.25;
      const tickStep = yearTickStep();

      const startYear = new Date(timelineStart).getFullYear();
      const endYear = new Date(timelineEnd).getFullYear();
      const years = Array.from({ length: endYear - startYear + 1 }, (_, index) => startYear + index);
      years.forEach((year) => {
        if (tickStep > 1 && year % tickStep !== 0 && year !== startYear && year !== endYear) return;
        const x = xForDate(`${year}-01-01`);
        const line = document.createElement("div");
        line.className = "year-line";
        line.style.left = `${x}px`;
        const tick = document.createElement("div");
        tick.className = "year-tick";
        tick.style.left = `${x}px`;
        const label = document.createElement("div");
        label.className = "year-label";
        label.style.left = `${x}px`;
        label.textContent = year;
        timelineCanvas.append(line, tick, label);

        if (showMonths) {
          for (let month = 1; month <= 12; month++) {
            const monthDate = `${year}-${String(month).padStart(2, "0")}-01`;
            if (new Date(monthDate).getTime() > timelineEnd || new Date(monthDate).getTime() < timelineStart) continue;
            const mx = xForDate(monthDate);
            const mt = document.createElement("div");
            mt.className = "month-tick";
            mt.style.left = `${mx}px`;
            const ml = document.createElement("div");
            ml.className = "month-label";
            ml.style.left = `${mx}px`;
            ml.textContent = month;
            timelineCanvas.append(mt, ml);
          }
        }
      });

      const baseVisibleCards = cardsMatchingBaseFilters();
      const visibleCards = baseVisibleCards.filter(card => hasActiveLevel(card, baseVisibleCards));
      visibleCount.textContent = `${visibleCards.length} / ${timelineCards.length}`;
      renderDensityNavigator(visibleCards);

      const axisY = 331.5;
      const rangeLaneStep = 30;
      const rangeGap = 10;
      const rangeGroups = { upper: [], lower: [] };
      const occupiedRanges = [];
      let maxUpperRangeLane = -1;
      let maxLowerRangeLane = -1;
      const canUseRangeLane = (side, lane, left) => {
        const laneEnd = rangeGroups[side][lane];
        return laneEnd === undefined || left > laneEnd + rangeGap;
      };
      const reserveRangeLane = (side, lane, right) => {
        rangeGroups[side][lane] = right;
        if (side === "upper") maxUpperRangeLane = Math.max(maxUpperRangeLane, lane);
        if (side === "lower") maxLowerRangeLane = Math.max(maxLowerRangeLane, lane);
      };
      const chooseRangePlacement = (left) => {
        for (let lane = 0; lane < 24; lane++) {
          const firstSide = lane % 2 === 0 ? "lower" : "upper";
          const secondSide = firstSide === "lower" ? "upper" : "lower";
          const logicalLane = Math.floor(lane / 2);
          if (canUseRangeLane(firstSide, logicalLane, left)) return { side: firstSide, lane: logicalLane };
          if (canUseRangeLane(secondSide, logicalLane, left)) return { side: secondSide, lane: logicalLane };
        }
        return { side: "lower", lane: rangeGroups.lower.length };
      };
      visibleCards.filter(card => card.kind === "range").sort((a, b) => new Date(a.startDate) - new Date(b.startDate)).forEach((card) => {
        const left = xForDate(card.startDate);
        const right = xForDate(card.endDate);
        const placement = chooseRangePlacement(left);
        reserveRangeLane(placement.side, placement.lane, right);
        const el = document.createElement("button");
        el.className = "range";
        el.style.setProperty("--main-color", tagColor(card.mainTag || card.tags[0]));
        el.style.left = `${left}px`;
        el.style.top = `${placement.side === "upper" ? axisY - 44 - placement.lane * rangeLaneStep : axisY + 20 + placement.lane * rangeLaneStep}px`;
        const rangeWidth = Math.max(16, right - left);
        el.style.width = `${rangeWidth}px`;
        const rangeTop = placement.side === "upper" ? axisY - 44 - placement.lane * rangeLaneStep : axisY + 20 + placement.lane * rangeLaneStep;
        occupiedRanges.push({
          left,
          right: left + rangeWidth,
          top: rangeTop,
          bottom: rangeTop + 24
        });
        el.innerHTML = `${rangeWidth >= 118 ? htmlEscape(card.title) : ""}<span class="range-tip"><span class="meta"><span>${htmlEscape(card.timeText)}</span><span class="grade-badge">${htmlEscape(card.level)} 级</span></span><strong>${htmlEscape(card.title)}</strong><span class="summary">${htmlEscape(card.summary)}</span></span>`;
        el.title = `${card.title} · ${card.timeText}`;
        el.addEventListener("mouseenter", positionRangeTip);
        el.addEventListener("mousemove", positionRangeTip);
        el.addEventListener("click", () => setSelected(card.id, "detail"));
        timelineCanvas.appendChild(el);
      });
      const lowerRangeBottom = maxLowerRangeLane >= 0 ? axisY + 20 + maxLowerRangeLane * rangeLaneStep + 24 : axisY + 20;
      const upperRangeTop = maxUpperRangeLane >= 0 ? axisY - 44 - maxUpperRangeLane * rangeLaneStep : axisY - 44;

      const pointCards = visibleCards.filter(card => card.kind !== "range").sort((a, b) => new Date(a.date) - new Date(b.date));
      const upperLaneCount = 10;
      const lowerLaneCount = 12;
      const laneStep = 58;
      const labelHeight = 62;
      const labelGap = 8;
      const upperLabelEnd = Math.max(72, upperRangeTop - 72);
      const upperLabelStart = Math.max(42, upperLabelEnd - (upperLaneCount - 1) * laneStep);
      const upperLabelLanes = Array.from({ length: upperLaneCount }, (_, lane) => upperLabelStart + lane * laneStep);
      const lowerLabelStart = lowerRangeBottom + 28;
      const lowerLabelLanes = Array.from({ length: lowerLaneCount }, (_, lane) => lowerLabelStart + lane * laneStep);
      const labelLanes = [...upperLabelLanes, ...lowerLabelLanes];
      timelineCanvas.style.height = `${Math.max(timelineFrame.clientHeight || 640, lowerLabelLanes[lowerLabelLanes.length - 1] + 132)}px`;
      const upperLanes = Array.from({ length: upperLaneCount }, (_, lane) => lane);
      const lowerLanes = Array.from({ length: lowerLaneCount }, (_, lane) => upperLaneCount + lane);
      const occupiedLabels = [...occupiedRanges];
      const labelWidth = 168;
      const rectsOverlap = (a, b) => !(a.right + labelGap <= b.left || b.right + labelGap <= a.left || a.bottom + labelGap <= b.top || b.bottom + labelGap <= a.top);
      const canPlaceLabel = rect => !occupiedLabels.some(existing => rectsOverlap(rect, existing));
      const positioned = pointCards.map(card => ({ card, x: xForDate(card.date), overlapGroup: null }));
      for (let i = 0; i < positioned.length;) {
        const group = [positioned[i]];
        let j = i + 1;
        while (j < positioned.length && Math.abs(positioned[j].x - group[group.length - 1].x) < 16) {
          group.push(positioned[j]);
          j++;
        }
        if (group.length > 1) {
          group.forEach(item => { item.overlapGroup = `overlap-${i}`; });
          const link = document.createElement("div");
          link.className = "overlap-link";
          const avgX = group.reduce((sum, item) => sum + item.x, 0) / group.length;
          link.style.left = `${avgX}px`;
          link.style.top = `${axisY - 12}px`;
          link.style.height = "24px";
          timelineCanvas.appendChild(link);
        }
        i = j;
      }

      positioned.forEach(({ card, x, overlapGroup }, index) => {
        const y = axisY;
        const mainColor = tagColor(card.mainTag || card.tags[0]);
        const subColor = card.subTag ? tagColor(card.subTag) : "transparent";
        const node = document.createElement("button");
        node.className = "node";
        if (card.id === selectedId) node.classList.add("selected");
        node.dataset.level = card.level;
        node.style.setProperty("--main-color", mainColor);
        node.style.setProperty("--sub-color", subColor);
        node.style.left = `${x}px`;
        node.style.top = `${y}px`;
        node.innerHTML = `<div class="dot"></div>`;
        node.addEventListener("click", () => setSelected(card.id, "detail"));
        timelineCanvas.appendChild(node);

        let lane = 0;
        const primary = overlapGroup
          ? (index % 2 === 0 ? lowerLanes : upperLanes)
          : (index % 2 === 0 ? upperLanes : lowerLanes);
        const secondary = primary === upperLanes ? lowerLanes : upperLanes;
        const preferred = [...primary, ...secondary];
        const labelLeft = Math.max(12, Math.min(x - labelWidth / 2, timelineCanvas.clientWidth - labelWidth - 12));
        let labelTop = null;
        for (const candidate of preferred) {
          const candidateTop = labelLanes[candidate];
          const rect = {
            left: labelLeft,
            right: labelLeft + labelWidth,
            top: candidateTop,
            bottom: candidateTop + labelHeight
          };
          if (canPlaceLabel(rect)) {
            lane = candidate;
            labelTop = candidateTop;
            occupiedLabels.push(rect);
            break;
          }
        }
        if (labelTop === null) return;

        const connector = document.createElement("div");
        connector.className = "timeline-connector";
        connector.style.left = `${x}px`;
        connector.style.top = `${Math.min(y, labelTop + 54)}px`;
        connector.style.height = `${Math.abs(labelTop + 54 - y)}px`;
        timelineCanvas.appendChild(connector);

        const label = document.createElement("button");
        label.className = "timeline-label";
        if (card.id === selectedId) label.classList.add("selected");
        label.style.setProperty("--main-color", mainColor);
        label.style.left = `${labelLeft}px`;
        label.style.top = `${labelTop}px`;
        label.innerHTML = `
          <div class="meta"><span>${card.timeText}</span><span class="grade-badge">${card.level} 级</span></div>
          <strong>${card.title}</strong>
          <p class="summary">${card.summary}</p>
        `;
        label.addEventListener("click", () => setSelected(card.id, "detail"));
        timelineCanvas.appendChild(label);
      });
    }

    function relationClass(kind) {
      if (kind.includes("前因")) return "cause";
      if (kind.includes("后果")) return "result";
      if (kind.includes("对立")) return "opposite";
      return "";
    }

    function fieldHtml(value) {
      const lines = String(value || "").split("\n").filter(Boolean);
      if (!lines.length) return "<p>暂无</p>";
      return lines.map(line => `<p>${line}</p>`).join("");
    }

    function renderDetail() {
      const card = byId[selectedId] || allCards[0];
      const hiddenLabels = new Set(["标题", "分级", "类型", "主标签", "副标签", "一句话概括"]);
      const bodyFields = (card.fields || []).filter(field => !hiddenLabels.has(field.label));
      const detailArticle = document.getElementById("detail-article");
      detailArticle.style.setProperty("--main-color", tagColor(card.mainTag));
      detailArticle.innerHTML = `
        <div class="badges">
          <span class="badge red grade">${card.level} 级</span>
          <span class="badge">${card.type}</span>
          ${card.tags.map(tag => tagBadgeHtml(tag)).join("")}
        </div>
        <h1>${card.title}</h1>
        <div class="summary">${card.summary}</div>
        <div class="detail-grid">
          ${bodyFields.map(field => `
            <section class="card detail-box ${field.value.length > 80 || field.value.includes("\n") ? "wide" : ""}">
              <h3>${field.label}</h3>
              ${fieldHtml(field.value)}
            </section>
          `).join("")}
        </div>
      `;

      const relations = card.relations || [];
      const relationItems = card.relationItems || [];
      document.getElementById("detail-relations").innerHTML = `
        <h2>关联卡片</h2>
        ${relations.length ? relations.map(rel => {
          const target = byId[rel.id];
          return `<article class="card relation-card ${relationClass(rel.text)}" ${target ? `data-card="${rel.id}"` : ""}>
            <h3>${rel.text}</h3>
            <p>${target ? target.summary : ""}</p>
          </article>`;
        }).join("") : relationItems.length ? relationItems.map(text => `
          <article class="card relation-card ${relationClass(text)}">
            <h3>${htmlEscape(text)}</h3>
          </article>
        `).join("") : `<div class="card empty">暂无关联卡片</div>`}
      `;
      document.querySelectorAll("#detail-relations [data-card]").forEach(el => {
        el.addEventListener("click", () => setSelected(el.dataset.card, "detail", { fromRelation: true }));
      });
    }

    function setZoom(value, anchorClientX = null) {
      const oldAxisWidth = axisWidthEstimate();
      const frameRect = timelineFrame.getBoundingClientRect();
      const anchorOffset = Number.isFinite(anchorClientX)
        ? Math.max(0, Math.min(timelineFrame.clientWidth, anchorClientX - frameRect.left))
        : timelineFrame.clientWidth / 2;
      const axisAnchorX = Math.max(0, Math.min(oldAxisWidth, timelineFrame.scrollLeft + anchorOffset - 70));
      const ratio = axisAnchorX / oldAxisWidth;
      zoom = Math.max(0.45, Math.min(8, value));
      const newAxisWidth = axisWidthEstimate();
      zoomSlider.value = zoom;
      if (activeLevels === null) renderLevelFilters();
      zoomReadout.textContent = `${Math.round(zoom * 100)}% · ${semanticLevelText()}`;
      renderTimeline();
      timelineFrame.scrollLeft = Math.max(0, 70 + ratio * newAxisWidth - anchorOffset);
      updateDensityWindow();
    }

    document.getElementById("zoom-in").addEventListener("click", () => setZoom(zoom + .25));
    document.getElementById("zoom-out").addEventListener("click", () => setZoom(zoom - .25));
    zoomSlider.addEventListener("input", event => setZoom(Number(event.target.value)));
    countryFilter.addEventListener("input", event => {
      activeCountryQuery = event.target.value;
      if (activeLevels === null) renderLevelFilters();
      renderTimeline();
    });
    filterToggle.addEventListener("click", () => {
      const collapsed = filtersPanel.classList.toggle("collapsed");
      filterToggle.textContent = collapsed ? "展开" : "收起";
      filterToggle.setAttribute("aria-expanded", String(!collapsed));
    });
    timelineFrame.addEventListener("wheel", event => {
      if (!event.ctrlKey && !event.metaKey) return;
      event.preventDefault();
      setZoom(zoom + (event.deltaY < 0 ? .08 : -.08), event.clientX);
    }, { passive: false });
    timelineFrame.addEventListener("scroll", () => {
      updateDensityWindow();
      updateViewportYears();
    });
    yearJumpForm.addEventListener("submit", event => {
      event.preventDefault();
      jumpToYear(yearJumpInput.value);
    });
    document.querySelectorAll(".era-shortcut[data-year]").forEach(button => {
      button.addEventListener("click", () => jumpToYear(button.dataset.year));
    });

    let gestureStartZoom = zoom;
    timelineFrame.addEventListener("gesturestart", event => {
      event.preventDefault();
      gestureStartZoom = zoom;
    });
    timelineFrame.addEventListener("gesturechange", event => {
      event.preventDefault();
      setZoom(gestureStartZoom * event.scale, event.clientX);
    });
    document.addEventListener("keydown", event => {
      const target = event.target;
      if (target && ["INPUT", "TEXTAREA", "SELECT"].includes(target.tagName)) return;
      const activeView = document.querySelector(".view.active")?.id;
      if (activeView !== "timeline") return;
      if (event.key === "+" || event.key === "=") {
        event.preventDefault();
        setZoom(zoom + .25);
      } else if (event.key === "-" || event.key === "_") {
        event.preventDefault();
        setZoom(zoom - .25);
      } else if (event.key === "0") {
        event.preventDefault();
        setZoom(defaultZoom);
      }
    });

    renderRecommendations();
    renderFilters();
    renderLevelFilters();
    renderTimeline();
    yearJumpInput.min = new Date(timelineStart).getFullYear();
    yearJumpInput.max = new Date(timelineEnd).getFullYear();
    updateViewportYears();
    renderDetail();
    setZoom(zoom);
  </script>
</body>
</html>
