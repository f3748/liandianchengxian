name: Verify card data

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Verify cards.json and cards-data.js
        run: python3 tools/cards.py verify
